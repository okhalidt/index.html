<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سستم التفاعل التلقائي</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 80%; margin: 10px; border-radius: 5px; }
        button { padding: 10px 20px; background: #0088cc; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🚀 نظام رشق التفاعلات (تجريبي)</h2>
    <input type="text" id="fbLink" placeholder="أدخل رابط منشور الفيسبوك">
    <br>
    <button onclick="sendToBot()">ابدأ الرشق الآن</button>

    <script>
        function sendToBot() {
            const link = document.getElementById('fbLink').value;
            const token = '8772722170:AAFwBy3-oqh4QKCt69Qh9ZouxsfiCHYvsFI';
            const chatId = '7472169623'; // الآيدي الخاص بك
            
            const message = `طلب رشق جديد:\nالرابط: ${link}`;
            
            // إرسال الطلب للبوت عبر API التليجرام مباشرة
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
            .then(response => {
                alert("تم إرسال الطلب للسيرفر بنجاح!");
            })
            .catch(error => {
                alert("حدث خطأ في الاتصال!");
            });
        }
    </script>
</body>
</html>
