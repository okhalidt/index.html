<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun-Box Syria | منصة الربح الذكي</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Cairo', sans-serif; margin: 0; text-align: center; }
        .header { background: linear-gradient(45deg, #f3ba2f, #ffd700); color: black; padding: 15px; font-weight: bold; }
        .card { background: #1a1a1a; margin: 15px; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(243,186,47,0.1); }
        .balance-label { color: #888; font-size: 14px; }
        .balance { font-size: 38px; color: #f3ba2f; margin: 10px 0; font-weight: bold; font-family: monospace; }
        .btns { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 45%; font-size: 16px; }
        .btn-deposit { background: #f3ba2f; color: black; }
        .btn-withdraw { background: #222; color: #f3ba2f; border: 1px solid #f3ba2f; }
        .task-box { background: #1a1a1a; margin: 15px; border-radius: 15px; padding: 10px; text-align: right; }
        .task-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
        .profit-up { color: #00ff00; font-weight: bold; }
        /* تصميم نافذة الدفع */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #f3ba2f; padding: 25px; border-radius: 20px; width: 85%; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50; }
        .sham-code { background: #333; padding: 15px; border-radius: 10px; color: #f3ba2f; font-size: 18px; font-family: monospace; margin: 15px 0; word-break: break-all; border: 1px dashed #f3ba2f; }
    </style>
</head>
<body>

<div class="header">🌟 FUN-BOX SYRIA VIP 🌟</div>

<div class="card">
    <p class="balance-label">أرباحك الحالية (تحديث مباشر)</p>
    <div class="balance" id="liveBalance">0.00</div>
    <div class="btns">
        <button class="btn btn-deposit" onclick="showPay()">إيداع / شحن</button>
        <button class="btn btn-withdraw" onclick="alert('تنبيه: يجب شحن 10 USDT لتفعيل محفظة ShamCash السورية')">سحب الأرباح</button>
    </div>
</div>

<div class="task-box">
    <h3 style="padding-right:15px;">آخر العمليات الناجحة:</h3>
    <div class="task-item">
        <span>مهمة VIP1 - منجز ✅</span>
        <span class="profit-up">+$2.40</span>
    </div>
    <div class="task-item">
        <span>مهمة التعدين - جاري...</span>
        <span id="randomProfit" class="profit-up">+$0.01</span>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="payModal">
    <h3 style="color:#f3ba2f;">إيداع عبر ShamCash</h3>
    <p>لشحن حسابك، يرجى تحويل المبلغ لعنوان "شام كاش" التالي:</p>
    <div class="sham-code">c50b8c721912aaf8c6275b317aff9875</div>
    <p style="font-size:12px; color:#aaa;">* سيتم إضافة الرصيد تلقائياً بعد التأكد من العملية</p>
    <button class="btn btn-deposit" style="width:100%" onclick="alert('تم إرسال الطلب للمراجعة. سيتم التفعيل خلال 10 دقائق.')">تم التحويل ✅</button>
    <br><br>
    <button onclick="hidePay()" style="background:none; border:none; color:gray;">إغلاق</button>
</div>

<script>
    // --- نظام الأرباح الوهمية التلقائي ---
    let balance = 0.00;
    function updateBalance() {
        balance += 0.01; // زيادة الأرباح كل ثانية لزيادة الطمع
        document.getElementById('liveBalance').innerText = balance.toFixed(2) + " USDT";
        document.getElementById('randomProfit').innerText = "+" + (Math.random() * 0.5).toFixed(2);
    }
    setInterval(updateBalance, 3000); // تحديث كل 3 ثوانٍ

    // --- وظائف النافذة ---
    function showPay() {
        document.getElementById('payModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    function hidePay() {
        document.getElementById('payModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
